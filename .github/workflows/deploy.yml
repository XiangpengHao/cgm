name: Deploy web app to GitHub Pages

# Builds the Dioxus web app (crates/cgm-web) to WASM and publishes it.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The flake pins the exact dioxus-cli / wasm-bindgen / tailwind / rust
      # toolchain, so the CI build matches local dev.
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Validate the portable crates before publishing.
      - name: Test (core + UI)
        run: nix develop --command cargo test

      - name: Build Tailwind CSS
        run: nix develop --command tailwindcss -i crates/cgm-web/tailwind.css -o crates/cgm-web/assets/tailwind.css

      # `--debug-symbols false` drops the wasm DWARF (which makes binaryen's
      # wasm-opt abort) and roughly halves the wasm. Assets resolve from "/"
      # (no base_path) because the site is served at a custom-domain root.
      - name: Build web app (release, WASM)
        run: |
          rm -rf target/dx/cgm-web   # avoid stale hashed assets if target/ is ever cached
          nix develop --command dx build --release --package cgm-web --debug-symbols false

      - name: Stage site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r target/dx/cgm-web/release/web/public/. _site/
          # SPA + 404 fallback so deep links resolve.
          cp _site/index.html _site/404.html
          # Keep the custom domain across deploys (must match repo Pages setting).
          echo "cgm.xiangpeng.systems" > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
